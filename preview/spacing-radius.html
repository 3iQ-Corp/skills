<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Radius scale — rem · and 100vw for pills</div>
  <div class="row" style="gap:16px; margin-top:4px">
    <div class="col" style="align-items:center; flex:1; gap:8px">
      <div style="width:80px; height:56px; background:#D6D5BF; border-radius:0.25rem"></div>
      <div class="value" style="font-size:11px">x-small · 0.25</div>
    </div>
    <div class="col" style="align-items:center; flex:1; gap:8px">
      <div style="width:80px; height:56px; background:#D6D5BF; border-radius:0.375rem"></div>
      <div class="value" style="font-size:11px">small · 0.375</div>
    </div>
    <div class="col" style="align-items:center; flex:1; gap:8px">
      <div style="width:80px; height:56px; background:#D6D5BF; border-radius:1rem"></div>
      <div class="value" style="font-size:11px">main · 1rem</div>
    </div>
    <div class="col" style="align-items:center; flex:1; gap:8px">
      <div style="width:120px; height:40px; background:#D6D5BF; border-radius:100vw"></div>
      <div class="value" style="font-size:11px">round · pill</div>
    </div>
  </div>
</div></body></html>
