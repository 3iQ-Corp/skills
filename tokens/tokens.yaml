# 3iQ Design Tokens
# Sourced from 3iq.io's live Webflow stylesheet (verified April 2026).
# Machine-readable companions: tokens/tokens.json and tokens/tokens.css.
# Keep all three in sync.

brand:
  name: "3iQ Corp"
  short: "3iQ"
  tagline: "Forging new paths in alternative investing."
  positioning: >
    Digital asset manager pioneering institutional-grade digital asset
    investments for forward-thinking institutions.
  founded: 2012
  hq: "161 Bay Street, Suite 2700, Toronto, Ontario, Canada M5J 2S1"
  parent: "Monex Group (Coincheck Group as of 2026)"

# ─────────────────────────────────────────────────────────────────────────────
# COLOR — sourced from --swatch--* on 3iq.io
# ─────────────────────────────────────────────────────────────────────────────
color:
  # Primitive palette — these are the atomic colors
  swatch:
    # Neutrals / surface
    dark:            "#080E23"   # primary dark / ink
    dark_secondary:  "#4C3D32"   # warm brown (used in Forge gradient)
    light:           "#FDFCFA"   # primary paper
    light_secondary: "#F4ECE5"   # warm cream
    light_tertiary:  "#F8F7F5"   # cool paper
    neutral:         "#DDDDDD"   # UI neutral / borders
    transparent:     "#FFFFFF00"

    # Muted brand palette (primary visual identity — NOT the accent colors)
    brand:    "#D6D5BF"          # sand / primary brand
    brand_2:  "#C9D7D7"          # pale sky
    brand_3:  "#EAE9DD"          # cream
    brand_4:  "#B8C6C6"          # sage

    # Accent / highlight
    green:    "#4C9478"          # positive, accent highlight
    yellow:   "#EDC576"          # eyebrow, accent bar, ticker badge (aka "gold")
    orange:   "#E6704E"          # warmth accent

    # Status
    alert_negative: "#DA3B3B"
    alert_positive: "#4C9478"    # alias of green

  # Semantic roles — USE THESE in templates, not the swatches above.
  # (Dark theme is the marketing/hero default; light theme for docs/paper.)
  role:
    # Dark theme (default for hero / social / slides)
    dark:
      bg:         "#080E23"      # swatch.dark
      surface:    "#4C3D32"      # swatch.dark_secondary (for gradient bottoms)
      text:       "#FDFCFA"      # swatch.light
      text_muted: "#D6D5BF"      # swatch.brand
      border:     "#FDFCFA"      # swatch.light (low opacity in use)
      cta_bg:     "transparent"  # CTA on dark uses a gradient (see gradient.button_dark)
      cta_text:   "#080E23"      # swatch.brand_text = swatch.dark
      accent:     "#EDC576"      # swatch.yellow
      rule:       "#EDC576"

    # Light theme (for docs, long-form, paper outputs)
    light:
      bg:         "#FDFCFA"      # swatch.light
      surface:    "#F8F7F5"      # swatch.light_tertiary
      text:       "#080E23"      # swatch.dark
      text_muted: "#4C3D32"      # swatch.dark_secondary
      border:     "#080E23"      # swatch.dark (low opacity in use)
      cta_bg:     "#D6D5BF"      # swatch.brand (solid brand fill on light)
      cta_text:   "#080E23"
      accent:     "#EDC576"
      rule:       "#080E23"

  # Fund-type theming — 3iq.io maps product lines to gradient themes.
  # Use these when producing anything associated with a specific fund family.
  fund_theme:
    etf:
      label: "ETF / Forge"
      gradient_top:    "#080E23"   # swatch.dark
      gradient_bottom: "#4C3D32"   # swatch.dark_secondary
      accent:          "#EDC576"   # yellow
    cef:
      label: "CEF / Growth"
      gradient_top:    "#1E3239"
      gradient_bottom: "#02393C"
      accent:          "#4C9478"   # green
    multi_crypto:
      label: "Multi-crypto / Warmth"
      gradient_top:    "#1C0E1D"
      gradient_bottom: "#3A1717"
      accent:          "#E6704E"   # orange

# ─────────────────────────────────────────────────────────────────────────────
# TYPOGRAPHY — sourced from --font--* and heading scale on 3iq.io
# ─────────────────────────────────────────────────────────────────────────────
typography:
  # Primary family — body, UI, small headlines (H6), buttons
  primary:
    family: "Neue Haas Grotesk Display, Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    source: "Adobe Typekit kit: iwl6vrh"
    fallback_web:  "Inter, -apple-system, Segoe UI, sans-serif"
    fallback_email: "Arial, Helvetica, sans-serif"
    fallback_pptx:  "Arial"
    weights:
      light: 300
      regular: 400      # "Roman"
      medium: 500
      semibold: 600
    self_hosted_woff2:
      - weight: 300
        file:  "https://cdn.prod.website-files.com/67166f7faf886e483962354e/67166f7faf886e483962358c_neuehaasdisplaylight-webfont.woff2"
      - weight: 400
        file:  "https://cdn.prod.website-files.com/67166f7faf886e483962354e/67166f7faf886e48396235d1_neuehaasdisplayroman-webfont.woff2"
      - weight: 500
        file:  "https://cdn.prod.website-files.com/67166f7faf886e483962354e/67166f7faf886e48396235d0_neuehaasdisplaymediu-webfont.woff2"

  # Secondary family — display and H1–H5 headlines
  secondary:
    family: "Denton, Palatino Linotype, Georgia, serif"
    source: "Self-hosted on Webflow CDN"
    fallback_web:  "Palatino Linotype, Georgia, serif"
    fallback_email: "Georgia, Times New Roman, serif"
    fallback_pptx:  "Times New Roman"
    weights:
      light: 300        # the only weight used on the site
    self_hosted:
      - weight: 300
        file_woff2: "https://cdn.prod.website-files.com/67166f7faf886e483962354e/67166f7faf886e48396235da_Denton-Light.woff2"
        file_otf:   "https://cdn.prod.website-files.com/67166f7faf886e483962354e/67166f7faf886e48396235db_Denton-Light.otf"

  # Local mirrors in this repo — prefer these for rendering scripts
  local:
    serif_variable: "assets/fonts/DentonVariableTest-VF.otf"      # placeholder — replace with Denton-Light when licensed
    sans_variable:  "assets/fonts/FunnelSans-VariableFont_wght.ttf" # stand-in for Neue Haas until licensed

  # Scale in rem (1rem = 16px). Fluid clamps on the live site; these are the
  # desktop-target values. Divide by 1.5–2.0 for mobile.
  scale:
    display:    "7rem"     # 112px — hero only, sparingly
    h1:         "5rem"     # 80px
    h2:         "4rem"     # 64px
    h3:         "3rem"     # 48px
    h4:         "2.5rem"   # 40px
    h5:         "2rem"     # 32px
    h6:         "1.5rem"   # 24px  — uses primary family (sans), weight 500
    text_large: "1.25rem"  # 20px
    text_main:  "1rem"     # 16px
    text_small: "0.875rem" # 14px

  # H1–H5 use secondary (Denton Light 300). H6 uses primary medium (500).
  role_to_family:
    display: secondary
    h1: secondary
    h2: secondary
    h3: secondary
    h4: secondary
    h5: secondary
    h6: primary
    text_large: primary
    text_main:  primary
    text_small: primary

  line_height:
    tight:   "1em"     # display, h1, h2
    snug:    "1.1em"   # h3, h4, h5
    normal:  "1.25em"  # h6, text_large, text_small
    relaxed: "1.5em"   # text_main

  letter_spacing:
    normal:  "0em"     # body
    heading: "0.01em"  # all headings (slight opening)
    wide:    "0.04em"  # eyebrows / small caps

  weight_defaults:
    heading: 300       # Denton Light
    body:    500       # Neue Haas Medium is the site's "regular" body
    ui:      500
    strong:  600

# ─────────────────────────────────────────────────────────────────────────────
# SIZE / SPACING — matches --size--* scale
# ─────────────────────────────────────────────────────────────────────────────
size:
  # Rem-based scale — use for padding, margin, gaps, max-widths
  "0":     "0rem"
  "0-125": "0.125rem"
  "0-25":  "0.25rem"
  "0-5":   "0.5rem"
  "0-75":  "0.75rem"
  "1":     "1rem"
  "1-25":  "1.25rem"
  "1-5":   "1.5rem"
  "2":     "2rem"
  "2-5":   "2.5rem"
  "3":     "3rem"
  "3-5":   "3.5rem"
  "4":     "4rem"
  "5":     "5rem"
  "6":     "6rem"
  "7":     "7rem"
  "8":     "8rem"
  "10":    "10rem"
  "12":    "12rem"
  "15":    "15rem"

padding:
  vertical:
    none:    "0rem"
    x_small: "2.5rem"
    small:   "5rem"
    main:    "7rem"
    large:   "10rem"
    x_large: "15rem"
  horizontal:
    small: "2.5rem"
    main:  "5rem"

# ─────────────────────────────────────────────────────────────────────────────
# RADIUS & BORDER
# ─────────────────────────────────────────────────────────────────────────────
radius:
  x_small: "0.25rem"
  small:   "0.375rem"
  main:    "1rem"
  round:   "100vw"       # pill / fully-rounded buttons

border_width:
  main:  "1px"
  large: "2px"

# ─────────────────────────────────────────────────────────────────────────────
# GRADIENTS — the brand leans on gradients more than solid accents.
# ─────────────────────────────────────────────────────────────────────────────
gradient:
  # Fund-theme hero backgrounds (vertical, 180deg)
  forge:   "linear-gradient(180deg, #080E23, #4C3D32)"
  growth:  "linear-gradient(180deg, #1E3239, #02393C)"
  warmth:  "linear-gradient(180deg, #1C0E1D, #3A1717)"

  # Card tints (vertical, light)
  card_sand:  "linear-gradient(180deg, #D6D5BF, #F8F7F5)"
  card_sky:   "linear-gradient(180deg, #C9D7D7, #F4ECE5)"
  card_cream: "linear-gradient(180deg, #EAE9DD, #FDFCFA)"
  card_sage:  "linear-gradient(180deg, #B8C6C6, #F8F7F5)"

  # Button on dark theme — primary CTA treatment
  button_dark: "linear-gradient(to right, #FDFCFA 15%, #D6D5BF 100%)"

  # Horizontal fade (e.g. dark-to-transparent)
  dark_fade_right: "linear-gradient(90deg, #080E23, #080E231A 65%)"

# ─────────────────────────────────────────────────────────────────────────────
# LOGO
# ─────────────────────────────────────────────────────────────────────────────
logo:
  primary: "assets/logos/3iq_logo.svg"
  viewbox: "0 0 96 30"
  clearspace: "Minimum clearspace around the logo equals the height of the 'Q'."
  min_width_px: 80
  favicon: "https://cdn.prod.website-files.com/66e3ac70d4e9ed3fc8e8ed73/671665da9e6883bbe185082a_3iq_favicon.png"
  webclip: "https://cdn.prod.website-files.com/66e3ac70d4e9ed3fc8e8ed73/671665ddd2780d4c95ae2533_3iq_webclip.png"

# ─────────────────────────────────────────────────────────────────────────────
# VOICE — informed by live site copy
# ─────────────────────────────────────────────────────────────────────────────
voice:
  tone: >
    Confident, precise, institutional. Uses measured language ("pioneering",
    "forging", "institutional-grade", "regulated"). Avoids hype. Treats
    digital assets as a legitimate asset class for traditional allocators.
  signature_phrases:
    - "Forging new paths in alternative investing."
    - "Institutional-grade digital asset investments."
    - "Pioneering digital asset investment management since 2012."
    - "Regulated, secure, institutional-grade."
  do:
    - "Lead with the fact or milestone; context follows."
    - "Name specific regulators, exchanges, and instruments."
    - "Cite firsts (e.g. 'world's first ETH staking ETF', 'first regulated DAIFM in Canada')."
    - "Use numbers with units (USD, bps, AUM, jurisdiction)."
    - "Prefer 'digital assets' over 'crypto' in institutional contexts."
  dont:
    - "Emojis in marketing copy."
    - "Crypto-native slang (HODL, WAGMI, moon, ape, etc.)."
    - "Exclamation marks."
    - "Hype adjectives (revolutionary, game-changing, disruptive, insane)."
    - "All-caps headlines (except short eyebrows)."

