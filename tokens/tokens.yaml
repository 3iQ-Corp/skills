# 3iQ Design Tokens
# Single source of truth for brand colors, type, and spacing.
# Machine-readable companion: tokens/tokens.json (keep in sync).

brand:
  name: "3iQ Digital Assets"
  tagline: "The institutional standard for digital assets."

color:
  # Core palette
  navy:    "#080E23"  # primary background / surface-dark
  green:   "#4C9478"  # primary CTA, positive, accent
  gold:    "#EDC576"  # eyebrow, accent bar, highlights
  offwhite: "#FDFCFA" # body text on dark, paper surface
  # Roles (semantic aliases — prefer these in templates)
  role:
    bg_primary:   "#080E23"
    bg_paper:     "#FDFCFA"
    text_on_dark: "#FDFCFA"
    text_on_light: "#080E23"
    cta:          "#4C9478"
    accent:       "#EDC576"
    rule:         "#EDC576"

typography:
  heading:
    family: "Denton Variable Test"
    file:   "assets/fonts/DentonVariableTest-VF.otf"
    style:  "serif, variable"
    usage:  "Big headlines, hero statements. Tight tracking, generous leading."
  body:
    family: "Funnel Sans"
    file:   "assets/fonts/FunnelSans-VariableFont_wght.ttf"
    style:  "sans-serif, variable"
    usage:  "Body copy, eyebrow, CTA labels, captions, UI."
  scale:
    # px values for web/email; adjust ratios as needed
    eyebrow:  12
    caption:  14
    body:     16
    lead:     18
    h4:       22
    h3:       28
    h2:       40
    h1:       56
    display:  72
  weight:
    regular:  400
    medium:   500
    semibold: 600
    bold:     700
  leading:
    tight:  1.1
    snug:   1.25
    normal: 1.5

spacing:
  # 4px base grid
  0:  0
  1:  4
  2:  8
  3:  12
  4:  16
  5:  24
  6:  32
  7:  48
  8:  64
  9:  96

radius:
  sm: 4
  md: 8
  lg: 16
  pill: 999

shadow:
  card: "0 4px 16px rgba(8, 14, 35, 0.12)"
  pop:  "0 12px 32px rgba(8, 14, 35, 0.24)"

logo:
  primary:  "assets/logos/3iq_logo.svg"
  clearspace: "Minimum clearspace around the logo equals the height of the 'Q'."
  min_width_px: 80

voice:
  tone: "Confident, precise, institutional. Never hype. Never exclamation marks."
  do:
    - "Lead with the fact, then the context."
    - "Name regulators, exchanges, and instruments specifically."
    - "Use numbers with units (USD, bps, AUM)."
  dont:
    - "Emojis in marketing copy."
    - "Crypto-native slang (HODL, WAGMI, moon, etc.)."
    - "Hype adjectives (revolutionary, game-changing, disruptive)."

disclaimer:
  standard: "This communication is for informational purposes only and does not constitute investment advice or an offer to sell or solicitation to buy any security."
